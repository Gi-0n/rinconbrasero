
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.ico" />
    <title>Rincón Brasero - CoMarketing</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #6b1f2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: linear-gradient(180deg, #d71e1e 0%, #8b0000 100%);
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
            padding: 40px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            color: white;
            position: relative;
        }

        .profile-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 4px solid white;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .profile-image img {
            width: 100px;
            height: auto;
        }

        h1 {
            font-size: 28px;
            font-weight: bold;
            margin: 5px 0;
        }

        p.subtitle {
            font-size: 16px;
            margin: 5px 0 25px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .social-icons a {
            color: white;
            font-size: 24px;
            text-decoration: none;
        }
        
        .fa-brands, .fab:hover {
            transform: scale(1.2);
            transition: transform 0.3s ease-in-out;
        }

        .fa-regular, .far:hover {
            transform: scale(1.2);
            transition: transform 0.3s ease-in-out;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .link-button {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
            background-color: #a01a1a;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #ff4d4d;
            position: relative;
            transition: background-color 0.3s ease;
        }

        .link-button:hover {
            background-color: #b91c1c;
        }

        .link-button .menu-dots {
            position: absolute;
            right: 20px;
            font-size: 20px;
        }

        .join-button {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 30px;
            background-color: white;
            color: #8b0000;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .join-button:hover {
            background-color: #d1d1d1;
        }

        .footer-links {
            margin-top: 30px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            margin: 0 5px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="profile-image" style="margin: 0 auto;">
            <img src="logo.svg" alt="Rincón Brasero Logo">
        </div>
        <h1>Rincón Brasero</h1>
        <p class="subtitle">Tu rincón favorito del sabor 🔥</p>

        <div class="social-icons">
            <a href="https://instagram.com/rincon.brasero" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@rincon.brasero" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.facebook.com/RinconBraseroo/" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="mailto:rinconbrasero@gmail.com" target="_blank"><i class="far fa-envelope"></i></a>
        </div>

        <div class="links">
            <a href="https://wa.link/ql2bk6" target="_blank" class="link-button">
                WhatsApp
                <span class="menu-dots">⋮</span>
            </a>
            <a href="https://www.tiktok.com/@rincon.brasero" target="_blank" class="link-button">
                TikTok
                <span class="menu-dots">⋮</span>
            </a>
            <a href="https://www.instagram.com/rincon.brasero" target="_blank" class="link-button">
                Instagram
                <span class="menu-dots">⋮</span>
            </a>
            <a href="https://www.facebook.com/RinconBraseroo/" target="_blank" class="link-button">
                Facebook
                <span class="menu-dots">⋮</span>
            </a>
        </div>
        <a href="https://www.milenial.news/descargas/rinconbrasero.pdf" target="_blank" class="join-button">Descarga nuestro menú</a>

        <div class="footer-links">
            <a href="#">Pollos</a> • <a href="#">Carnes</a> • <a href="#">Almuerzos</a>
        </div>
    </div>
</body>
</html>
